name: backend-cd
on:
    push:
        branches:
            - feature/backend
jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Login to DockerHub
              uses: docker/login-action@v2
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}
            - name: Build and push Docker image
              uses: docker/build-push-action@v4
              with:
                context: .
                file: ./docker/Dockerfile.backend
                push: true
                tags: ${{ secrets.DOCKER_USERNAME }}/backend:${{ github.sha }}
            - name: Deploy to VM
              run: |
                echo "{{ secrets.SSH_MONOREPO_HOST }}" &> ~/ssh_keys
                chmod 700 ~/ssh_keys
                ssh -o "StrictHostKeyChecking=no" -i ~/ssh_keys root@165.227.41.43 -t "docker pull ${{ secrets.DOCKER_USERNAME }}/backend:${{ github.sha }} && docker stop backend || true && docker rm backend || true && docker run -d --name backend -p 8080:8080 ${{ secrets.DOCKER_USERNAME }}/backend:${{ github.sha }}"